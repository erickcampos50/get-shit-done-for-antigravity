# App: Gestão de Manutenções de Ar Condicionado (CMMS)
# Namespace slug: manutencao-ac
# Módulos: Local, Tecnico, Equipamento, Manutencao
# Charts: ManutencoesPorStatus, CustoTotalPorMes, ManutencoesPorTipo
# Páginas: 8 (4 listas + 4 detalhes)

namespace:
  - name: "Gestão de Manutenções de AC"
    slug: manutencao-ac
    enabled: true
    meta:
      iconid: 0
      logoid: 0
      logoenabled: false
      hidesidebar: false

    # ── CHARTS ───────────────────────────────────────────────────────────────
    # Definidos antes dos modules para referência nas páginas.
    # Todos referenciam o módulo Manutencao.
    chart:
      # Chart 1: Distribuição de manutenções por status (rosca, em %)
      - config:
          reports:
            - module: Manutencao
              metrics:
                - field: count
                  relativeValue: true       # mostra % por fatia
                  type: doughnut
                  label: Status
                  fixTooltips: true
              dimensions:
                - field: Status             # campo Select do módulo Manutencao
                  modifier: (no grouping / buckets)
                  conditions: {}
                  meta: {}
                  skipMissing: true
        handle: ManutencoesPorStatus
        name: Manutenções por Status
        namespaceID: manutencao-ac

      # Chart 2: Custo total acumulado por mês (linha temporal)
      - config:
          reports:
            - module: Manutencao
              metrics:
                - field: Cost              # campo Number do módulo Manutencao
                  aggregate: SUM           # soma os valores de Cost agrupados por mês
                  type: line
                  label: Custo Total (R$)
                  fill: true
                  lineTension: 0.3
              dimensions:
                - field: createdAt        # campo de data de criação (campo do sistema)
                  modifier: MONTH          # agrupa por mês
                  conditions: {}
                  meta: {}
                  skipMissing: true
                  autoSkip: true
        handle: CustoTotalPorMes
        name: Custo Total por Mês
        namespaceID: manutencao-ac

      # Chart 3: Quantidade de manutenções por tipo (barras)
      - config:
          reports:
            - module: Manutencao
              metrics:
                - field: count
                  type: bar
                  label: Manutenções
              dimensions:
                - field: Type              # campo Select (Preventiva, Corretiva, Inspeção)
                  modifier: (no grouping / buckets)
                  conditions: {}
                  meta: {}
                  skipMissing: false       # false = mostra tipos sem registros (valor 0)
        handle: ManutencoesPorTipo
        name: Manutenções por Tipo
        namespaceID: manutencao-ac

    # ── MÓDULOS ───────────────────────────────────────────────────────────────
    # Ordem de dependência:
    # Local (sem deps) → Tecnico (sem deps) → Equipamento (ref. Local) → Manutencao (ref. Equipamento + Tecnico)
